<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage booking</title>
<!--
  SELF-SERVE BOOKING MANAGEMENT — /manage/<recordId>?t=<token>.
  Guests land here from their confirmation text. View, cancel or
  reschedule without an account — the HMAC token IS the auth.
  Standalone static page — not part of the React app.
-->
<style>
  :root{ --accent:#22c3a6; --text:#1d2329; --muted:#66758a; --soft:#f6f4f0; --line:#e6e0d8; }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#efece7;color:var(--text);min-height:100vh;padding:18px 12px}
  .shell{max-width:520px;margin:0 auto;background:#fff;border-radius:26px;overflow:hidden;border:1px solid var(--line);box-shadow:0 18px 50px rgba(35,28,22,.14)}
  .top{padding:20px;color:#fff}
  .top b{font-size:17px;display:block}
  .top span{font-size:12.5px;opacity:.9}
  .body{padding:20px}
  .sum{background:var(--soft);border-radius:14px;padding:14px;margin-bottom:14px}
  .r{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}
  .r span{color:var(--muted)}
  .r b{font-weight:800;text-align:right}
  .pill{display:inline-block;padding:4px 12px;border-radius:999px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
  .btn{width:100%;min-height:50px;border:none;border-radius:14px;font-weight:900;font-size:15px;cursor:pointer;margin-top:10px}
  .btn.warn{background:#fdecec;color:#b03030}
  .btn.ghost{background:var(--soft);color:var(--text)}
  .btn.main{color:#fff}
  label{font-size:11.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin:12px 0 5px}
  input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:11px;font:inherit;background:#fbfaf8}
  .note{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.5}
  .err{background:#fdecec;color:#b03030;border-radius:10px;padding:10px 12px;font-size:13px;margin-top:10px;display:none}
  .ok{text-align:center;padding:34px 10px}
  .ok .big{font-size:50px}
  .center{min-height:70vh;display:grid;place-items:center;color:#8a8074;font-weight:700;text-align:center;padding:20px}
  .slotgrid{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .slot{padding:10px 14px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-weight:800;font-size:13px;cursor:pointer}
  .slot.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .slot:disabled{background:#f0ece5;color:#b3aca0;cursor:not-allowed}
</style>
</head>
<body>
<div id="root" class="center">Loading your booking…</div>
<script>
'use strict';
var API = window.CC_API_BASE || 'https://gcr-api-clean.vercel.app';
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
var id = (location.pathname.match(/\/manage\/([a-zA-Z0-9-]+)/) || [])[1] || new URLSearchParams(location.search).get('id');
var tok = new URLSearchParams(location.search).get('t');
var D = null, view = 'summary', pick = { date:null, endDate:null, time:null, slots:[] };

function accent(){ return (D&&D.business&&D.business.accent)||'#22c3a6'; }
function load(){
  fetch(API+'/api/platform/manage/'+encodeURIComponent(id)+'?t='+encodeURIComponent(tok))
    .then(function(r){ return r.json().then(function(d){ if(!r.ok) throw new Error(d.error||'Could not load'); return d; }); })
    .then(function(d){ D=d; document.documentElement.style.setProperty('--accent', accent()); render(); })
    .catch(function(e){ document.getElementById('root').textContent = e.message; });
}
function statusPill(s){
  var c = { pending:'#8a6d1a;background:#fdf3d7', confirmed:'#1a7a4f;background:#dff5e9', cancelled:'#b03030;background:#fdecec', completed:'#3b5bd6;background:#e6ebfd' };
  return '<span class="pill" style="color:'+(c[s]||'#66758a;background:#eee')+'">'+esc(s)+'</span>';
}
function render(){
  var b = D.business||{}, k = D.booking||{};
  document.title = 'Manage — '+(b.name||'');
  var host = document.getElementById('root');
  host.className='';
  var inner = '';
  if(view==='summary'){
    inner = '<div class="sum">'+
      (k.title?'<div class="r"><span>Booking</span><b>'+esc(k.title)+'</b></div>':'')+
      '<div class="r"><span>Name</span><b>'+esc(k.customer)+'</b></div>'+
      (k.date?'<div class="r"><span>'+(k.end_date?'Check-in':'Date')+'</span><b>'+esc(k.date)+'</b></div>':'')+
      (k.end_date?'<div class="r"><span>Check-out</span><b>'+esc(k.end_date)+'</b></div>':'')+
      (k.time?'<div class="r"><span>Time</span><b>'+esc(k.time)+'</b></div>':'')+
      (k.party?'<div class="r"><span>Party</span><b>'+esc(k.party)+'</b></div>':'')+
      (k.resource?'<div class="r"><span>Reserved</span><b>'+esc(k.resource)+'</b></div>':'')+
      (k.addons?'<div class="r"><span>Add-ons</span><b>'+esc(k.addons)+'</b></div>':'')+
      '<div class="r"><span>Status</span><b>'+statusPill(k.status)+'</b></div></div>';
    if(k.status==='cancelled'){
      inner += '<div class="note">This booking is cancelled. Want to come back? Book fresh any time.</div>'+
        '<a class="btn main" style="background:'+accent()+';display:flex;align-items:center;justify-content:center;text-decoration:none;color:#fff" href="/p/'+esc(b.slug||'')+'">Book again →</a>';
    } else if(D.canModify){
      inner += '<button class="btn main" style="background:'+accent()+'" onclick="view=\'reschedule\';render()">📅 Reschedule</button>'+
        '<button class="btn warn" onclick="doCancel()">✕ Cancel this booking</button>'+
        '<div class="note">Free to change or cancel until '+D.cancelHours+' hours before your booking.</div>';
    } else {
      inner += '<div class="note">Inside the '+D.cancelHours+'-hour window, changes need a quick call'+(b.phone?': <a href="tel:'+esc(b.phone)+'" style="color:'+accent()+';font-weight:800">'+esc(b.phone)+'</a>':' to the business')+'.</div>';
    }
  }
  else if(view==='reschedule'){
    inner = '<label>New date</label><input type="date" id="nd" value="'+esc(pick.date||k.date||'')+'" onchange="pickDate(this.value)">'+
      (D.mode==='range' ? '<label>New check-out</label><input type="date" id="ne" value="'+esc(pick.endDate||k.end_date||'')+'" onchange="pick.endDate=this.value">' : '')+
      (D.mode==='slots' ? '<label>New time</label><div class="slotgrid" id="slots">'+(pick.slots.length?renderSlots():'<span class="note">Pick a date to see times</span>')+'</div>' : '')+
      '<div class="err" id="rs-err"></div>'+
      '<button class="btn main" style="background:'+accent()+'" onclick="doReschedule()">Confirm new time →</button>'+
      '<button class="btn ghost" onclick="view=\'summary\';render()">← Back</button>';
  }
  host.innerHTML = '<div class="shell">'+
    '<div class="top" style="background:linear-gradient(135deg,'+accent()+',#1c2b40)"><b>'+esc(b.name||'')+'</b><span>Manage your booking</span></div>'+
    '<div class="body">'+inner+'</div></div>';
}
function renderSlots(){
  var need = D.seats ? ((D.booking&&D.booking.party)||1) : 1; // seats-based apps need room for the whole party
  return pick.slots.map(function(sl){
    return '<button type="button" class="slot'+(pick.time===sl.time?' on':'')+'" '+(sl.remaining<need?'disabled':'')+
      ' onclick="pick.time=\''+esc(sl.time)+'\';render()">'+esc(sl.time)+(sl.remaining<=0?' · full':'')+'</button>';
  }).join('');
}
window.pickDate = function(d){
  pick.date = d; pick.time = null;
  if(D.mode==='slots' && D.appId){
    fetch(API+'/api/platform/page/'+encodeURIComponent(D.business.slug)+'/availability?app='+encodeURIComponent(D.appId)+'&date='+encodeURIComponent(d))
      .then(function(r){return r.json();})
      .then(function(a){ pick.slots = a.slots||[]; render(); })
      .catch(function(){ pick.slots=[]; render(); });
  }
};
window.doCancel = function(){
  if(!confirm('Cancel this booking? This can\'t be undone.')) return;
  fetch(API+'/api/platform/manage/'+encodeURIComponent(id)+'/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({t:tok})})
    .then(function(r){ return r.json().then(function(d){ if(!r.ok) throw new Error(d.error||'Could not cancel'); return d; }); })
    .then(function(){
      document.getElementById('root').innerHTML = '<div class="shell"><div class="body ok"><div class="big">👋</div><h2>Booking cancelled</h2>'+
        '<p style="color:var(--muted);font-size:14px">You\'ll get a confirmation text. Come back any time!</p>'+
        '<a class="btn main" style="background:'+accent()+';display:flex;align-items:center;justify-content:center;text-decoration:none;color:#fff" href="/p/'+esc(D.business.slug||'')+'">Back to '+esc(D.business.name||'the page')+'</a></div></div>';
    })
    .catch(function(e){ alert(e.message); });
};
window.doReschedule = function(){
  var errEl = document.getElementById('rs-err');
  errEl.style.display='none';
  var body = { t: tok, date: pick.date || (document.getElementById('nd')||{}).value };
  if(D.mode==='range') body.end_date = pick.endDate || (document.getElementById('ne')||{}).value;
  if(D.mode==='slots') body.time = pick.time;
  fetch(API+'/api/platform/manage/'+encodeURIComponent(id)+'/reschedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){ return r.json().then(function(d){ if(!r.ok) throw new Error(d.error||'Could not reschedule'); return d; }); })
    .then(function(d){
      D.booking.date = d.date; if(d.end_date) D.booking.end_date = d.end_date; if(d.time) D.booking.time = d.time;
      view='summary'; render();
      var host = document.querySelector('.body');
      host.insertAdjacentHTML('afterbegin','<div class="sum" style="background:#dff5e9;color:#1a7a4f;font-weight:800;text-align:center">✓ Moved to '+esc(d.date)+(d.time?' · '+esc(d.time):'')+' — confirmation text on the way</div>');
    })
    .catch(function(e){ errEl.style.display='block'; errEl.textContent = e.message; });
};
if(!id || !tok){ document.getElementById('root').textContent = 'This link is missing its key — use the link from your confirmation text.'; }
else load();
</script>
</body>
</html>
