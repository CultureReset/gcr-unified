<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews</title>
<!--
  CYBERCHECK REVIEWS — public review wall. /reviews/<slug>.
  Verified badges are earned by proof (completed transactions),
  never bought. Embeddable on any website via iframe.
  Standalone static page — URL-only, outside the React app.
-->
<style>
  :root{ --accent:#22c3a6; --text:#1d2329; --muted:#66758a; --soft:#f6f4f0; --line:#e6e0d8; }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#efece7;color:var(--text);min-height:100vh;padding:18px 12px}
  .shell{max-width:560px;margin:0 auto;background:#f9f7f4;border-radius:26px;overflow:hidden;border:1px solid var(--line);box-shadow:0 18px 50px rgba(35,28,22,.14)}
  .top{padding:26px 22px 20px;color:#fff;text-align:center}
  .top h1{margin:8px 0 2px;font-size:24px;letter-spacing:-.02em}
  .top p{margin:0;font-size:13px;opacity:.92}
  .agg{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:12px}
  .agg .num{font-size:34px;font-weight:900}
  .agg .stars{color:#f5c33b;font-size:18px;letter-spacing:2px}
  .agg .sub{font-size:12px;opacity:.9;text-align:left;line-height:1.4}
  .list{padding:16px 18px 24px;display:flex;flex-direction:column;gap:11px}
  .rv{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px}
  .rv-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:5px}
  .rv-head b{font-size:14px}
  .rv .stars{color:#f5a623;font-size:14px;letter-spacing:1px}
  .rv p{margin:6px 0 0;font-size:13.5px;line-height:1.55;color:#3c4a55}
  .vbadge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#0e8a4d;background:#e3f4ea;border-radius:5px;padding:2px 7px}
  .obadge{display:inline-flex;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#8a7a53;background:#f5eeda;border-radius:5px;padding:2px 7px}
  .foot{text-align:center;color:#9a8f83;font-size:11.5px;padding:0 18px 22px;line-height:1.5}
  .center{min-height:70vh;display:grid;place-items:center;color:#8a8074;font-weight:700}
</style>
</head>
<body>
<div id="root" class="center">Loading…</div>
<script>
'use strict';
var API = window.CC_API_BASE || 'https://gcr-api-clean.vercel.app';
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function starStr(n){ var s=''; for(var i=1;i<=5;i++) s += i<=n?'★':'☆'; return s; }
var slug = (location.pathname.match(/\/reviews\/([a-z0-9-]+)/i) || [])[1] || new URLSearchParams(location.search).get('b');
if(!slug){ document.getElementById('root').textContent='No business specified.'; }
else fetch(API+'/api/platform/reviews/'+encodeURIComponent(slug))
  .then(function(r){ if(!r.ok) throw new Error('Reviews not found'); return r.json(); })
  .then(function(d){
    document.title = d.business.name+' — Reviews';
    var rows = (d.reviews||[]).map(function(r){
      var badge = r.badge==='Verified Booking'
        ? '<span class="vbadge">🛡️ Verified Booking</span>'
        : '<span class="obadge">Unverified opinion</span>';
      return '<div class="rv"><div class="rv-head"><b>'+esc(r.name)+'</b><span class="stars">'+starStr(r.stars)+'</span></div>'+
        badge + (r.text?'<p>'+esc(r.text)+'</p>':'')+'</div>';
    }).join('');
    document.getElementById('root').className='';
    document.getElementById('root').innerHTML =
      '<div class="shell">'+
        '<div class="top" style="background:linear-gradient(160deg,'+esc(d.business.accent||'#22c3a6')+',#1c2b40)">'+
          '<div style="font-size:34px">'+esc(d.business.emoji||'🏪')+'</div>'+
          '<h1>'+esc(d.business.name)+'</h1><p>'+esc(d.business.tagline||'')+'</p>'+
          '<div class="agg"><span class="num">'+(d.average||'—')+'</span>'+
          '<div><div class="stars">'+starStr(Math.round(d.average||0))+'</div>'+
          '<div class="sub">'+d.count+' review'+(d.count===1?'':'s')+' · '+d.verified_count+' verified</div></div></div></div>'+
        '<div class="list">'+(rows||'<div style="text-align:center;color:#9a8f83;padding:18px">No reviews yet — be the first!</div>')+'</div>'+
        '<div class="foot">🛡️ Verified badges are earned by real completed bookings — never bought.<br>CyberCheck Reviews</div>'+
      '</div>';
  })
  .catch(function(e){ document.getElementById('root').textContent = e.message; });
</script>
</body>
</html>
